[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 20260521104500_operational_profiles || true && npm run db:migrate && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "veloce-app"
